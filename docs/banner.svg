<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1224"/><stop offset="50%" style="stop-color:#1a1145"/><stop offset="100%" style="stop-color:#0d1224"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/><stop offset="50%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#89d4ff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
