<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0F1D"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>

    <!-- Glass Box Gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.03)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.01)"/>
    </linearGradient>
    
    <!-- Neon Filters -->
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-indigo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Drop Shadow for Cards -->
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Arrows -->
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#a855f7"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Base Background -->
  <rect width="1000" height="520" rx="24" fill="url(#bg)"/>

  <!-- Chrome Browser Boundary -->
  <rect x="40" y="40" width="680" height="440" rx="24" fill="url(#glass)" stroke="#334155" stroke-width="2" stroke-dasharray="8,8"/>
  <rect x="40" y="40" width="200" height="34" rx="12" fill="#1e293b"/>
  <text x="56" y="62" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#cbd5e1" font-weight="800" letter-spacing="1">🌐 GOOGLE CHROME</text>

  <!-- =============================== -->
  <!-- NODE 1: CONTENT SCRIPT (Left)   -->
  <!-- =============================== -->
  <g transform="translate(80, 110)">
    <!-- Main Card -->
    <rect width="250" height="230" rx="16" fill="#111827" stroke="#a855f7" stroke-width="2" filter="url(#card-shadow)"/>
    <rect width="250" height="230" rx="16" fill="rgba(168,85,247,0.05)"/>
    
    <!-- Header -->
    <circle cx="28" cy="32" r="6" fill="#a855f7" filter="url(#glow-purple)"/>
    <text x="46" y="37" font-family="monospace" font-size="16" fill="#e9d5ff" font-weight="bold">content.js</text>
    <line x1="20" y1="55" x2="230" y2="55" stroke="#334155" stroke-width="1"/>

    <!-- Content -->
    <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">
      <text x="24" y="85">✨ <tspan fill="#cbd5e1" font-weight="600">UI Injection</tspan> (Panel &amp; FAB)</text>
      <text x="24" y="115">🤖 8 Custom AI Agents + Edit</text>
      <text x="24" y="145">🌍 i18n Translation Engine</text>
      <text x="24" y="175">📋 Select Text &amp; Inject Result</text>
      <!-- Warning -->
      <rect x="24" y="195" width="202" height="22" rx="6" fill="rgba(244,63,94,0.1)"/>
      <text x="32" y="210" font-size="11" fill="#f43f5e" font-weight="bold" font-family="monospace">⚠ NEVER CALLS API DIRECTLY</text>
    </g>
  </g>


  <!-- =============================== -->
  <!-- NODE 2: BACKGROUND.JS (Right)   -->
  <!-- =============================== -->
  <g transform="translate(430, 110)">
    <!-- Main Card -->
    <rect width="250" height="230" rx="16" fill="#111827" stroke="#6366f1" stroke-width="2" filter="url(#card-shadow)"/>
    <rect width="250" height="230" rx="16" fill="rgba(99,102,241,0.05)"/>
    
    <!-- Header -->
    <circle cx="28" cy="32" r="6" fill="#6366f1" filter="url(#glow-indigo)"/>
    <text x="46" y="37" font-family="monospace" font-size="16" fill="#e0e7ff" font-weight="bold">background.js</text>
    <line x1="20" y1="55" x2="230" y2="55" stroke="#334155" stroke-width="1"/>

    <!-- Content -->
    <g font-family="'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">
      <text x="24" y="85">🛡️ <tspan fill="#cbd5e1" font-weight="600">Service Worker Proxy</tspan></text>
      <text x="24" y="115">🔐 API Key Vault (BYOK)</text>
      <text x="24" y="145">🧹 Input Scrubbing</text>
      <text x="24" y="175">🖱️ Right-Click Context Menu</text>
      <text x="24" y="205">⌨️ Global Shortcuts Handler</text>
    </g>
  </g>


  <!-- =============================== -->
  <!-- NODE 3: STORAGE (Bottom)        -->
  <!-- =============================== -->
  <g transform="translate(195, 385)">
    <!-- Main Card -->
    <rect width="370" height="70" rx="12" fill="#111827" stroke="#f59e0b" stroke-width="1.5" filter="url(#card-shadow)"/>
    <rect width="370" height="70" rx="12" fill="rgba(245,158,11,0.05)"/>
    
    <circle cx="28" cy="35" r="5" fill="#f59e0b" filter="url(#glow-amber)"/>
    <text x="46" y="31" font-family="monospace" font-size="15" fill="#fde68a" font-weight="bold">chrome.storage.local</text>
    <text x="46" y="52" font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">Persists: API Key • Chat History • Token Usage • Themes</text>
  </g>


  <!-- =============================== -->
  <!-- NODE 4: GROQ API (Far Right)    -->
  <!-- =============================== -->
  <g transform="translate(755, 140)">
    <!-- Main Card -->
    <rect width="210" height="170" rx="16" fill="#111827" stroke="#10b981" stroke-width="2" filter="url(#card-shadow)"/>
    <rect width="210" height="170" rx="16" fill="rgba(16,185,129,0.05)"/>
    
    <!-- Header -->
    <circle cx="28" cy="32" r="6" fill="#10b981" filter="url(#glow-green)"/>
    <text x="46" y="37" font-family="monospace" font-size="16" fill="#d1fae5" font-weight="bold">Groq Cloud</text>
    <line x1="20" y1="55" x2="190" y2="55" stroke="#334155" stroke-width="1"/>

    <!-- Content -->
    <g font-family="'Segoe UI', sans-serif" font-size="12" fill="#94a3b8">
      <text x="24" y="85">⚡ <tspan fill="#d1fae5" font-weight="600">Llama 3.3 70B</tspan></text>
      <text x="24" y="115">⚡ Mixtral 8x7B</text>
      <text x="24" y="145">⚡ Sub-second Inference</text>
    </g>
  </g>


  <!-- =============================== -->
  <!-- CONNECTION LINES & LABELS       -->
  <!-- =============================== -->
  
  <!-- Content script <-> Background.js -->
  <path d="M 330 185 L 415 185" stroke="#a855f7" stroke-width="3" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-purple)"/>
  <path d="M 430 205 L 345 205" stroke="#6366f1" stroke-width="3" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-indigo)"/>
  <text x="375" y="174" font-family="monospace" font-size="11" fill="#e9d5ff" text-anchor="middle" font-weight="bold">chrome.runtime.sendMessage</text>
  <text x="375" y="222" font-family="'Segoe UI', sans-serif" font-size="10" fill="#a5b4fc" text-anchor="middle">(Messages &amp; Sanity Checks)</text>

  <!-- Background.js <-> Groq API -->
  <path d="M 680 205 L 740 205" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrow-green)"/>
  <text x="710" y="195" font-family="monospace" font-size="12" fill="#10b981" font-weight="bold" text-anchor="middle">HTTPS</text>
  <text x="710" y="222" font-family="'Segoe UI', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Secure Fetch</text>

  <!-- Content Script to Storage (Read/Write) -->
  <path d="M 205 340 L 205 385" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  
  <!-- Background to Storage (Read/Write) -->
  <path d="M 555 340 L 555 385" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" fill="none"/>

</svg>
